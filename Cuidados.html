<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Phudu:wght@300..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="estilos.css">
</head>

<body>
  <header>
    <div class="fondo">
      <h1 id="titulo">Mi Jardín</h1>
      <nav class="navbar">
        <input type="text" id="buscador" placeholder="Buscar planta...">
        <button id="BotonBusqueda">Buscar</button>
        <a href="plantas.html" class="inicio"><strong> Inicio </strong></a></li>
      </nav>
    </div>
  </header>
  <main>
    <section id="riego">
        <h2 class="texto-cuidados"><strong>Riegos</strong></h2>
        <table id="miTabla" style="width: 600px;" action="/formulario" method="POST">
          <thead>
            <tr>
              <th>Nombre de la planta</th>
              <th type="date--">Regada</th>
              <th>Proximo riego</th>
            </tr>
          </thead>
          <tbody>
            <td> <input type="text"></td>
            <td><input type="date"></td>
            <td><input type="date"></td>
          </tbody>
          <tfoot></tfoot>
        </table>
        <button onclick="añadirFila()" id="filas">+</button>
      </section>
  
      <section id="fertilizacion">
        <h2 class="texto-cuidados"><strong>Fertilización</strong></h2>
        <table id="miTabla" style="width: 600px;" action="/formulario" method="POST">
          <thead>
            <tr>
              <th>Nombre de la planta</th>
              <th>Fertilizada</th>
              <th>Próxima fertilización</th>
            </tr>
          </thead>
          <tbody>
            <td> <input type="text"></td>
            <td><input type="date"></td>
            <td><input type="date"></td>
          </tbody>
          <tfoot></tfoot>
        </table>
        <button onclick="añadirFila()" id="filas">+</button>
      </section>
  
      <section id="tierra">
        <h2 class="texto-cuidados"><strong>Cambio de tierra</strong></h2>
        <table id="miTabla" style="width: 600px;" action="/formulario" method="POST">
          <thead>
            <tr>
              <th>Nombre de la planta</th>
              <th type="date">Cambio</th>
              <th>Próximo cambio</th>
            </tr>
          </thead>
          <tbody>
            <td> <input type="text"></td>
            <td><input type="date"></td>
            <td><input type="date"></td>
          </tbody>
          <tfoot></tfoot>
        </table>
        <button onclick="añadirFila()" id="filas">+</button>
      </section>
      <button onclick="guardarDatos()" id="guardar">Guardar datos.</button>
    </main>
  </main>
  <footer>
    <p>&copy; 2025. Mi jardín.</p>
 </footer>
