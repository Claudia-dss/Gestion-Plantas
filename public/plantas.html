<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Jardín — Inicio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Phudu:wght@300..900&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="estilos.css">
  <style>
    /* Ajuste específico para la página de inicio */
    main {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 48px 24px;
      gap: 0;
    }
    #misplantas, #misterrarios, #miscuidados {
      margin-bottom: 16px;
    }
  </style>
</head>

<body>
  <header>
    <div class="fondo">
      <h1 id="titulo">Mi Jardín</h1>
      <div class="search"> 
        <input type="text" id="buscador" placeholder="Buscar planta...">
        <button type="button" class="btn-buscador">Buscar</button>
      </div>
      <nav class="navbar bg-body-tertiary">
        <div class="container-fluid">
          <button class="navbar-toggler" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasNavbar" aria-controls="offcanvasNavbar" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="offcanvas offcanvas-end" tabindex="-1" id="offcanvasNavbar" aria-labelledby="offcanvasNavbarLabel">
            <div class="offcanvas-header">
              <h5 class="offcanvas-title" id="offcanvasNavbarLabel">Menú</h5>
              <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close">X</button>
            </div>
            <div class="offcanvas-body">
              <ul class="mi-menu-inicio justify-content-end flex-grow-1 pe-3">
                <li class="nav-item">
                  <a class="nav-link active" aria-current="page" href="plantas.html">Inicio</a>
                </li>
                <li class="nav-item">
                  <a class="nav-link" href="MisPlantas.html">Mis Plantas</a>
                </li>
                <li class="nav-item">
                  <a class="nav-link" href="MisTerrarios.html">Mis Terrarios</a>
                </li>
                <li class="nav-item">
                  <a class="nav-link" href="Cuidados.html">Cuidados</a>
                </li>
              </ul>
            </div>
          </div>
        </div>
      </nav>
    </div>
  </header>

  <main>
    <div id="misplantas">
      <button type="button" id="cuadrado-1" onclick="window.location.href='MisPlantas.html'">
        <span>
          <h2><strong>Mis plantas</strong></h2>
          <p>Plantas que tengo en posesión</p>
        </span>
      </button>
    </div>

    <div id="misterrarios">
      <button type="button" id="cuadrado-2" onclick="window.location.href='MisTerrarios.html'">
        <span>
          <h2><strong>Mis terrarios</strong></h2>
          <p>Terrarios que tengo en posesión</p>
        </span>
      </button>
    </div>

    <div id="miscuidados">
      <button type="button" id="cuadrado-3" onclick="window.location.href='Cuidados.html'">
        <span>
          <h2><strong>Cuidados</strong></h2>
          <p>Riegos, fertilización y cambios de tierra.</p>
        </span>
      </button>
    </div>
  </main>

  <footer>
    <p>&copy; 2025. Mi jardín.</p>
  </footer>
  <script src="conexion-bd.js"></script>
  <script src="referenciasplantitas.js"></script>
  <script src="referenciasterrarios.js"></script>
  <script src="server.js"></script>
</body>
</html>
