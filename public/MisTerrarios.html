<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="estilos.css">
    <title>Mis Terrarios</title>
</head>

<body>
  <header>
    <div class="fondo"> 
        <h1 id="titulo">Mi Jardín</h1>
      <div class="search">
        <input type="text" id="buscador" placeholder="Buscar planta...">
        <button type="button" class="btn-buscador">Buscar</button>
      </div>
      <nav class="navbar bg-body-tertiary">
        <div class="container-fluid">
          <button class="navbar-toggler" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasNavbar" aria-controls="offcanvasNavbar" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="offcanvas offcanvas-end" tabindex="-1" id="offcanvasNavbar" aria-labelledby="offcanvasNavbarLabel">
            <div class="offcanvas-header">
              <h5 class="offcanvas-title" id="offcanvasNavbarLabel">Menú</h5>
              <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close">X</button>
            </div>
            <div class="offcanvas-body">
              <ul class="mi-menu-inicio justify-content-end flex-grow-1 pe-3">
                <li class="nav-item">
                  <a class="nav-link active" aria-current="page" href="MisTerrarios.html">Mis Terrarios</a>
                </li>
                <li class="nav-item">
                  <a class="nav-link" href="plantas.html">Inicio</a>
                </li>
                <li class="nav-item">
                  <a class="nav-link" href="MisPlantas.html">Mis Plantas</a>
                </li>
                <li class="nav-item">
                  <a class="nav-link" href="Cuidados.html">Cuidados</a>
                </li>
                <li>
                  <a class="nav-link" href="escaner.html">Escáner IA</a>
                </li>
              </ul>
            </div>
          </div>
        </div>
      </nav>
    </div>
  </header>

    <main>
        <section id="posesion">
          <form id="form-plantas" action="server.js" method="POST">
            <table id="miTabla">
            <thead>
                <tr>
                <th>Nombre del terrario</th>
                <th type="date--">Adquirido</th>
                <th type="file">Foto</th>
                <th class="desplegable">Ubicación</th>
                <th class="desplegable">Estado de la planta</th>
                <th type="date--">Pulverizado el: </th>
                </tr>
            </thead>
            <tbody>
                <td> <input type="text" class="texto"></td>

                <td><input type="date" class="fecha"></td>

                <td><input type="file"></td>

                <td>
                  <select id="despleg-ubi">
                    <option value="">Selecciona un tipo</option>
                    <option value="Salón">Salón</option>
                    <option value="Habitación">Habitación</option>
                    <option value="Baño">Baño</option>
                    <option value="Cocina">Cocina</option>
                    <option value="Terraza">Terraza</option>
                  </select>
                </td>

                <td>
                  <select id="despleg-estado">
                    <option value="">Selecciona un tipo</option>
                    <option value="Sana">Sana</option>
                    <option value="Enferma">Enferma</option>
                    <option value="Muerta">Muerta</option>                
                  </select>
                </td>

                <td><input type="date" class="fecha"></td>
            </tbody>
            <tfoot></tfoot>
            </table>
          <button type="button" onclick="crearFila()" id="filas">+</button>
          <button type="button" onclick="eliminarFilaSeleccionada()" id="borrar-filas">🗑️</button>
          <button type="button" onclick="guardarCambios()" id="btn-guardar"> Guardar cambios</button>
        </form>
      </section><br>
    </main>
    <footer>
    <p>&copy; 2025. Mi jardín.</p>
    </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/referenciasterrarios.js"></script>
  <script src="/js/buscador.js"></script>
</body>
