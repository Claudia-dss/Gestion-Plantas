<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Phudu:wght@300..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="estilos.css">
    <title>Link a Mis Plantas</title>
</head>

<body>
  <header>
    <div class="fondo">
      <h1 id="titulo">Mi Jardín</h1>
      <nav class="navbar">
        <input type="text" id="buscador" placeholder="Buscar planta...">
        <button id="BotonBusqueda">Buscar</button>
        <a href="plantas.html" class="inicio"><strong> Inicio </strong></a></li>
      </nav>
    </div>
  </header>

  <main>
    <section id="posesion">
      <form id="form-plantas" action="guardar.php" method="POST">
        <table id="miTabla">
          <thead>
            <tr>
              <th>Nombre de la planta</th>
              <th type="img">Foto</th>
              <th class="desplegable">Tipo de la planta</th>
              <th class="desplegable">Ubicación</th>
              <th class="desplegable">Estado de la planta</th>
              <th type="date--">Adquirida</th>
            </tr>
          </thead>

          <tbody>
            <tr>
            <td> <input type="text"></td>
            <td> <input type="file"></td>
            <td>
              <select id="despleg-tipo">
                <div class="contenido-desplegable">
                  <option value="">Selecciona un tipo</option>
                  <option value="Suculenta">Suculenta</option>
                  <option value="Cactus">Cactus</option>
                  <option value="Crasas">Crasas</option>
                  <option value="Planta con flor">Planta con flor</option>
                  <option value="Planta sin flor">Planta sin flor</option>
                  <option value="Planta acuática">Planta acuática</option>
                  <option value="Árbol">Árbol</option>
                  <option value="Hierba">Hierba</option>
                </div>
              </select>
            </td>

            <td>
              <select id="despleg-ubi">
                <option value="">Selecciona un tipo</option>
                <option value="Salón">Salón</option>
                <option value="Habitación">Habitación</option>
                <option value="Baño">Baño</option>
                <option value="Cocina">Cocina</option>
                <option value="Terraza">Terraza</option>
              </select>
            </td>
            <td>
              <select id="despleg-estado">
                <div class="contenido-desplegable"></div>
                <option value="">Selecciona un tipo</option>
                <option value="Sana">Sana</option>
                <option value="Enferma">Enferma</option>
                <option value="Muerta">Muerta</option> 
              </select>
            </td>

            <td><input type="date"></td>
            </tr>
          </tbody>
          <tfoot></tfoot>
        </table>
      <button type="button" onclick="crearFila()" id="filas">+</button>
      <button type="button" onclick="guardarCambios()" id="btn-guardar"> Guardar cambios </button>
      <button type="button" onclick="eliminarFilaSeleccionada()" id="btn-guardar"> Eliminar Fila </button>
    </form>
  </section> <br>
  </main>

  <footer>
  <p>&copy; 2025. Mi jardín.</p>
  </footer>

  <script src="conexion-bd.js"></script>
  <script src="referenciasplantitas.js"></script>
  <script src="server.js"></script>
</body>
</html>
